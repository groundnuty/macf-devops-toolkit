# Central OpenTelemetry Collector — Deployment mode (not DaemonSet at our scale).
#
# Pipeline shape:
#   receivers: OTLP gRPC 4317, OTLP HTTP 4318
#   processors: k8sattributes (enrich spans with pod/ns/node metadata) + batch
#   exporters: Tempo (traces, gRPC OTLP), Prometheus (metrics scraping endpoint
#              on :8889), debug
#
# CRD: opentelemetry.io/v1beta1 (storage version as of operator v0.148.0;
# confirmed against opentelemetry-operator/apis/v1beta1/opentelemetrycollector_types.go).

---
apiVersion: v1
kind: Namespace
metadata:
  name: otel

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: otel

---
# k8sattributes processor needs cluster-wide read on pods/namespaces/nodes
# plus apps replicasets/deployments to resolve ownerReferences chains.
# Reference: https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/processor/k8sattributesprocessor#rbac
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-k8sattributes
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-k8sattributes
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: otel
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector-k8sattributes

---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: central
  namespace: otel
spec:
  mode: deployment
  serviceAccount: otel-collector
  # Image is inherited from the operator's default (see
  # values/opentelemetry-operator.yaml manager.collectorImage — contrib build).
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.pod.start_time
            - k8s.deployment.name
            - k8s.node.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
    exporters:
      otlp/tempo:
        endpoint: tempo.tempo.svc.cluster.local:4317
        tls:
          insecure: true
      prometheus:
        endpoint: 0.0.0.0:8889
      debug:
        verbosity: normal
    service:
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [k8sattributes, batch]
          exporters:  [otlp/tempo, debug]
        metrics:
          receivers:  [otlp]
          processors: [batch]
          exporters:  [prometheus]
