apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd-applications
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: operations
  sources:
    # NOTE: grafana-community (not grafana). Monolithic chart migrated from
    # grafana/helm-charts on 2026-01-30. See ../../../research/2026-04-24-chart-version-verification.md §1.
    - repoURL: https://grafana-community.github.io/helm-charts
      chart: tempo
      targetRevision: 2.0.0
      helm:
        releaseName: tempo
        valueFiles:
          - $values/enviroments/macf/values/tempo.yaml
    - repoURL: https://github.com/groundnuty/macf-devops-toolkit.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: tempo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
