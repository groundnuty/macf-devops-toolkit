# Central OpenTelemetry Collector — Deployment mode (not DaemonSet at our scale).
#
# Pipeline shape (post #11):
#   receivers: OTLP gRPC 4317, OTLP HTTP 4318
#   processors:
#     k8sattributes         — enrich spans with pod/ns/node metadata
#     resource/paper-dims   — ensure paper-dimension attrs propagate end-to-end
#                             per science-agent tracing-plumbing-sketch §5.3:
#                             agent.id, agent.role, agent.rules_variant,
#                             scenario.run_id, scenario.name, scenario.role
#     batch                 — default batching
#   exporters:
#     otlp/tempo            — Grafana Tempo (gRPC OTLP); trace search + timeline
#     otlphttp/langfuse     — Langfuse OTLP-HTTP endpoint (basic-auth via Secret);
#                             LLM-specific views with gen_ai.* attr parsing
#     prometheus            — :8889 scrape endpoint for OTLP metrics
#     debug                 — stdout, verbosity: basic
#
# CRD: opentelemetry.io/v1beta1 (storage version as of operator v0.148.0;
# confirmed against opentelemetry-operator/apis/v1beta1/opentelemetrycollector_types.go).

---
apiVersion: v1
kind: Namespace
metadata:
  name: otel

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: otel

---
# k8sattributes processor needs cluster-wide read on pods/namespaces/nodes
# plus apps replicasets/deployments to resolve ownerReferences chains.
# Reference: https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/processor/k8sattributesprocessor#rbac
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-k8sattributes
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-k8sattributes
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: otel
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector-k8sattributes

---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: central
  namespace: otel
spec:
  mode: deployment
  serviceAccount: otel-collector
  # Image is inherited from the operator's default (see
  # values/opentelemetry-operator.yaml manager.collectorImage — contrib build).
  # Langfuse Basic-Auth derived from public+secret keys in langfuse-api-keys
  # Secret (Opaque, two keys). Secret generated by hack/langfuse-api-keys.sh
  # from keys the operator creates in the Langfuse UI (first-user signup +
  # "Create project" → "API keys"). Collector builds the Authorization header
  # from $(LANGFUSE_PUBLIC_KEY):$(LANGFUSE_SECRET_KEY) at render time via
  # the exporter's `auth` config — see otlphttp/langfuse below.
  env:
    - name: LANGFUSE_PUBLIC_KEY
      valueFrom:
        secretKeyRef:
          name: langfuse-api-keys
          key: public-key
    - name: LANGFUSE_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: langfuse-api-keys
          key: secret-key
  config:
    extensions:
      # basicauth extension — computes "Authorization: Basic <b64(public:secret)>"
      # header for otlphttp/langfuse. Env-var-interpolation into extension
      # config is supported in otel-collector-contrib.
      basicauth/langfuse:
        client_auth:
          username: "${env:LANGFUSE_PUBLIC_KEY}"
          password: "${env:LANGFUSE_SECRET_KEY}"
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.pod.start_time
            - k8s.deployment.name
            - k8s.node.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          # Fallback: match on the source TCP connection's IP (for clients that
          # don't set k8s.pod.ip / k8s.pod.uid resource attrs themselves).
          - sources:
              - from: connection
      # Paper-dimension preservation per science-agent tracing-plumbing-sketch §5.3.
      # The resource processor passes these attrs through verbatim if already
      # set on the incoming span (by the agent's OTEL_RESOURCE_ATTRIBUTES env),
      # OR adds sentinel "unknown" values if missing so downstream queries don't
      # NULL-match. Actions: "upsert" preserves existing values + adds defaults
      # for missing keys.
      resource/paper-dims:
        attributes:
          - key: agent.id
            value: unknown-agent
            action: insert   # only set if absent
          - key: agent.role
            value: unknown-role
            action: insert
          - key: agent.rules_variant
            value: unknown-variant
            action: insert
          - key: scenario.run_id
            value: none
            action: insert
          - key: scenario.name
            value: none
            action: insert
          - key: scenario.role
            value: none
            action: insert
    exporters:
      otlp/tempo:
        endpoint: tempo.tempo.svc.cluster.local:4317
        tls:
          insecure: true
      otlphttp/langfuse:
        # Langfuse OTLP endpoint — HTTP/JSON + HTTP/protobuf only, no gRPC
        # (see https://langfuse.com/integrations/native/opentelemetry).
        endpoint: http://langfuse-web.langfuse.svc.cluster.local:3000/api/public/otel
        auth:
          authenticator: basicauth/langfuse
        # Retry config tuned for transient 503s — Langfuse ClickHouse can be
        # slow on cold starts; default 5s initial is too aggressive.
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 2m
      prometheus:
        endpoint: 0.0.0.0:8889
      debug:
        # `basic` is the steady-state choice — matches the existing compose
        # collector config. Flip to `normal` or `detailed` via `kubectl patch`
        # only when actively debugging; `normal`+ floods stdout under burst.
        verbosity: basic
    service:
      extensions: [basicauth/langfuse]
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [k8sattributes, resource/paper-dims, batch]
          exporters:  [otlp/tempo, otlphttp/langfuse, debug]
        metrics:
          receivers:  [otlp]
          processors: [batch]
          exporters:  [prometheus]
