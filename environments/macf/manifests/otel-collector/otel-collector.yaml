# Central OpenTelemetry Collector — Deployment mode (not DaemonSet at our scale).
#
# Pipeline shape (post #11):
#   receivers: OTLP gRPC 4317, OTLP HTTP 4318
#   processors:
#     k8sattributes         — enrich spans with pod/ns/node metadata
#     resource/paper-dims   — ensure paper-dimension attrs propagate end-to-end
#                             per science-agent tracing-plumbing-sketch §5.3:
#                             gen_ai.agent.name, gen_ai.agent.role,
#                             agent.rules_variant, scenario.run_id,
#                             scenario.name, scenario.role
#                             (gen_ai.agent.* names follow OTel GenAI semconv;
#                              corrected from informal `agent.id`/`agent.role`
#                              per #26 + macf#245 alignment)
#     batch                 — default batching
#   exporters:
#     otlp/tempo            — Grafana Tempo (gRPC OTLP); trace search + timeline
#     otlphttp/langfuse     — Langfuse OTLP-HTTP endpoint (basic-auth via Secret);
#                             LLM-specific views with gen_ai.* attr parsing
#     prometheus            — :8889 scrape endpoint for OTLP metrics
#     debug                 — stdout, verbosity: basic
#
# CRD: opentelemetry.io/v1beta1 (storage version as of operator v0.148.0;
# confirmed against opentelemetry-operator/apis/v1beta1/opentelemetrycollector_types.go).

---
apiVersion: v1
kind: Namespace
metadata:
  name: otel

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: otel

---
# k8sattributes processor needs cluster-wide read on pods/namespaces/nodes
# plus apps replicasets/deployments to resolve ownerReferences chains.
# Reference: https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/processor/k8sattributesprocessor#rbac
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-k8sattributes
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-k8sattributes
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: otel
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector-k8sattributes

---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: central
  namespace: otel
spec:
  mode: deployment
  serviceAccount: otel-collector
  # Image is inherited from the operator's default (see
  # values/opentelemetry-operator.yaml manager.collectorImage — contrib build).
  # Langfuse Basic-Auth derived from public+secret keys in langfuse-api-keys
  # Secret (Opaque, two keys). Secret generated by hack/langfuse-api-keys.sh
  # from keys the operator creates in the Langfuse UI (first-user signup +
  # "Create project" → "API keys"). Collector builds the Authorization header
  # from $(LANGFUSE_PUBLIC_KEY):$(LANGFUSE_SECRET_KEY) at render time via
  # the exporter's `auth` config — see otlphttp/langfuse below.
  env:
    - name: LANGFUSE_PUBLIC_KEY
      valueFrom:
        secretKeyRef:
          name: langfuse-api-keys
          key: public-key
    - name: LANGFUSE_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: langfuse-api-keys
          key: secret-key
    # ClickHouse password for the `clickhouse` exporter on the logs
    # pipeline (added per #28). Same `langfuse-clickhouse-creds` Secret
    # the DaemonSet logs-Collector reads (populated by
    # `make clickhouse-logs-creds` from ns/langfuse's langfuse-clickhouse).
    - name: CLICKHOUSE_PASSWORD
      valueFrom:
        secretKeyRef:
          name: langfuse-clickhouse-creds
          key: password
  config:
    extensions:
      # basicauth extension — computes "Authorization: Basic <b64(public:secret)>"
      # header for otlphttp/langfuse. Env-var-interpolation into extension
      # config is supported in otel-collector-contrib.
      basicauth/langfuse:
        client_auth:
          username: "${env:LANGFUSE_PUBLIC_KEY}"
          password: "${env:LANGFUSE_SECRET_KEY}"
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.pod.start_time
            - k8s.deployment.name
            - k8s.node.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          # Fallback: match on the source TCP connection's IP (for clients that
          # don't set k8s.pod.ip / k8s.pod.uid resource attrs themselves).
          - sources:
              - from: connection
      # Paper-dimension preservation per science-agent tracing-plumbing-sketch §5.3.
      # Action `insert` — only adds if the key is absent; preserves existing
      # agent-set values verbatim. (`upsert` would overwrite agent values and
      # break the measurement apparatus — agents stamp these attrs at
      # bootstrap via OTEL_RESOURCE_ATTRIBUTES, which is the authoritative
      # source.)
      #
      # Why some attrs have defaults + some don't:
      # - gen_ai.agent.name / gen_ai.agent.role: NOT defaulted. Any agent
      #   emitting OTLP should have these stamped at bootstrap (tester
      #   settings.json env block per sketch §5.2; for production agents see
      #   each substrate workspace's claude.sh OTLP block). Names follow OTel
      #   GenAI semconv — `gen_ai.*` namespace, not flat `agent.*` (corrected
      #   from informal naming per #26 + macf#245 alignment).
      #   Missing = agent-config bug; fail loud (absent attr) rather than
      #   mask with `unknown-agent` sentinel that collides with legitimate
      #   operator-daily-thread spans.
      # - agent.rules_variant: defaulted to `unknown`. Only testers know their
      #   variant (rules-loaded vs rules-bare for A/B); production agents
      #   don't, and that's OK to label explicitly.
      # - scenario.*: defaulted to `none`. Most spans aren't part of a
      #   scenario run — operator-daily traffic, routine agent work.
      #   `none` is a clean filterable value that means "not a scenario span".
      resource/paper-dims:
        attributes:
          - key: agent.rules_variant
            value: unknown
            action: insert
          - key: scenario.run_id
            value: none
            action: insert
          - key: scenario.name
            value: none
            action: insert
          - key: scenario.role
            value: none
            action: insert
    exporters:
      otlp/tempo:
        endpoint: tempo.tempo.svc.cluster.local:4317
        tls:
          insecure: true
      otlphttp/langfuse:
        # Langfuse OTLP endpoint — HTTP/JSON + HTTP/protobuf only, no gRPC
        # (see https://langfuse.com/integrations/native/opentelemetry).
        endpoint: http://langfuse-web.langfuse.svc.cluster.local:3000/api/public/otel
        auth:
          authenticator: basicauth/langfuse
        # Retry config tuned for transient 503s — Langfuse ClickHouse can be
        # slow on cold starts; default 5s initial is too aggressive.
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 2m
      prometheus:
        endpoint: 0.0.0.0:8889
        # Promote OTel resource attributes to Prometheus labels (per #29).
        # Without this, claude_code_* metrics arrive but
        # `gen_ai.agent.role`, `agent.rules_variant`, `service.namespace`
        # etc. don't surface as queryable labels — Issue H per-cell
        # aggregation can't filter without them.
        # Cardinality risk is low here: paper-dim attrs are mostly
        # low-card (agent role/name, rules_variant). `scenario.run_id`
        # is the higher-card one but defaults to "none" via the
        # resource/paper-dims processor for non-scenario traffic.
        resource_to_telemetry_conversion:
          enabled: true

      # Loki + ClickHouse exporters added per #28 — central Collector
      # gains a `logs:` pipeline so agents' OTLP-emitted logs route to
      # the same backends the DaemonSet's filelog scrapes go to. Without
      # these, CC's OTLP log records arrive at :14318 + are silently
      # dropped (no logs pipeline = no exporter = drop). Same exporter
      # config + retry tuning as the DaemonSet's logs-Collector.
      otlphttp/loki:
        endpoint: http://loki.loki.svc.cluster.local:3100/otlp
        tls:
          insecure: true
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 2m
      clickhouse:
        endpoint: tcp://langfuse-clickhouse.langfuse.svc.cluster.local:9000
        username: default
        password: ${env:CLICKHOUSE_PASSWORD}
        database: logs
        logs_table_name: otel_logs
        # `create_schema: true` is idempotent — schema was already created
        # by the DaemonSet logs-Collector on first ingest, so this is a
        # no-op on first central-collector startup. If the central
        # Collector ever boots BEFORE the DaemonSet, it'd create the
        # schema instead. Same outcome.
        create_schema: true
        ttl: 168h
        timeout: 10s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 2m

      debug:
        # `basic` is the steady-state choice — matches the existing compose
        # collector config. Flip to `normal` or `detailed` via `kubectl patch`
        # only when actively debugging; `normal`+ floods stdout under burst.
        verbosity: basic
    service:
      extensions: [basicauth/langfuse]
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [k8sattributes, resource/paper-dims, batch]
          exporters:  [otlp/tempo, otlphttp/langfuse, debug]
        metrics:
          receivers:  [otlp]
          processors: [batch]
          exporters:  [prometheus]
        # Logs pipeline (added per #28). Receives OTLP logs from agents
        # (testers, post-restart substrate agents). k8sattributes is
        # harmless on host-side OTLP logs (no k8s.pod.uid to look up,
        # processor silently no-ops); resource/paper-dims preserves
        # agent-stamped attrs (insert-not-upsert). Both backends in
        # parallel mirroring the DaemonSet logs-Collector pattern.
        logs:
          receivers:  [otlp]
          processors: [k8sattributes, resource/paper-dims, batch]
          exporters:  [otlphttp/loki, clickhouse, debug]
