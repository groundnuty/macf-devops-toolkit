# LoadBalancer Service for the central OpenTelemetry Collector's OTLP receivers.
#
# Why a SECOND service alongside the operator-managed `central-collector`:
# the operator creates a ClusterIP service (needed for in-cluster clients like
# the Grafana Tempo datasource or future Langfuse exporter). For external
# (host-side) testers to push traces without `kubectl port-forward`, we need a
# LoadBalancer service that k3d's serverlb picks up + exposes via the host-port
# mappings declared in `k3d/config.yaml` (`127.0.0.1:14317:4317` +
# `127.0.0.1:14318:4318` on the loadbalancer node).
#
# Routing chain host → pod:
#   localhost:14317 (host)
#     → k3d-macf-serverlb:14317 (k3d nginx proxy, added via k3d ports mapping)
#       → k3d-macf-server-0:4317 (klipper-lb hostPort binding from this Service)
#         → pod label-selector → central-collector Deployment pods
#
# Labels mirror the operator-created Service's selector — kept in sync with
# the chart-default labels generated by the opentelemetry-operator when it
# reconciles an OpenTelemetryCollector CR named `central` in ns/otel.

apiVersion: v1
kind: Service
metadata:
  name: central-collector-lb
  namespace: otel
  labels:
    app.kubernetes.io/component: opentelemetry-collector
    app.kubernetes.io/instance: otel.central
    app.kubernetes.io/managed-by: opentelemetry-operator
    app.kubernetes.io/part-of: opentelemetry
    macf.dev/role: stable-otlp-ingress
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/component: opentelemetry-collector
    app.kubernetes.io/instance: otel.central
    app.kubernetes.io/managed-by: opentelemetry-operator
    app.kubernetes.io/part-of: opentelemetry
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
