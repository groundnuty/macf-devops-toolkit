# langfuse-k8s helm values — chart 1.5.27 (Langfuse app 3.169.0)
# Chart repo: https://langfuse.github.io/langfuse-k8s
# Provenance: research/2026-04-24-chart-version-verification.md + chart Chart.yaml
#
# Single-node dev sizing per issue #2 notes:
# - clickhouse.replicaCount=1 (chart default 3; Langfuse supports 1 — not HA)
# - clickhouse.resourcesPreset=small (chart default 2xlarge; dev-scale)
# - clickhouse.clusterEnabled=false (single-replica; skips ON-CLUSTER migrations)
# - zookeeper trimmed similarly
#
# Secrets flow: 7 secrets (3 app-layer + 4 bitnami subchart auth) live in
# separate Secret resources (manifests/langfuse/secrets.yaml.example shows
# the template). Values reference them via secretKeyRef/existingSecret — no
# plaintext passwords in this file.

global:
  security:
    # Chart default is already `true` (uses bitnamilegacy/* images since the
    # 2025-08-28 Bitnami registry migration). Listed here for explicitness.
    allowInsecureImages: true

# --- Langfuse application --------------------------------------------------
langfuse:
  nodeEnv: production

  logging:
    level: info
    format: json  # argocd + kubectl logs handle structured logs better than text

  # App-layer secrets — all from the single `langfuse-secrets` Secret.
  # Generate via: openssl rand -base64 32 (salt, nextauth) / openssl rand -hex 32 (encryption).
  salt:
    secretKeyRef:
      name: langfuse-secrets
      key: salt
  encryptionKey:
    secretKeyRef:
      name: langfuse-secrets
      key: encryptionKey
  nextauth:
    # URL stays localhost since we reach Langfuse via `make pf-langfuse`
    # (port-forward to :3001). If ingress is ever added (e.g. Traefik
    # IngressRoute on an external hostname), THIS VALUE MUST BE OVERRIDDEN
    # to the external URL — otherwise NextAuth's OAuth callbacks will
    # continue redirecting to localhost:3000 and silently break external
    # logins. Same applies to `OAUTH_CLIENT_ORIGIN` if SSO providers get
    # wired in later.
    url: http://localhost:3000
    secret:
      secretKeyRef:
        name: langfuse-secrets
        key: nextauth

  features:
    telemetryEnabled: false  # don't phone home from dev/research workloads
    signUpDisabled: true     # headless-init creates the admin user; lock further signups
    experimentalFeaturesEnabled: true

  ingress:
    enabled: false  # port-forward only in the spike

  # Web deployment overrides:
  # - additionalEnv: Langfuse reads LANGFUSE_INIT_* env vars on first boot
  #   to create org/project/user/API-keys WITHOUT requiring a UI signup
  #   (https://langfuse.com/self-hosting/headless-initialization). The
  #   `langfuse-init` Secret is generated + applied by
  #   hack/langfuse-bootstrap.sh (`make langfuse-bootstrap`); same script
  #   writes a parallel `langfuse-api-keys` Secret in ns/otel so the
  #   Collector's otlphttp/langfuse exporter has the matching basic-auth
  #   keys — single source of truth for public/secret keys.
  #
  #   NOTE on `additionalEnv` vs `additionalEnvFrom`: chart v1.5.27 (which
  #   we pin) only supports `additionalEnv` (explicit per-key list). Newer
  #   chart main has `additionalEnvFrom` (bulk Secret import) — when we
  #   bump past 1.5.27, the 9 entries below collapse to a single secretRef.
  # - probe delays: chart defaults (initialDelaySeconds=20) fire before
  #   Langfuse finishes its 390+ Prisma migrations on first install, so
  #   the kubelet liveness-probe kills the pod mid-migration + restarts.
  #   Bumped to 120/60s so migrations can complete before probes fire.
  web:
    pod:
      additionalEnv:
        - name: LANGFUSE_INIT_ORG_ID
          valueFrom: { secretKeyRef: { name: langfuse-init, key: LANGFUSE_INIT_ORG_ID } }
        - name: LANGFUSE_INIT_ORG_NAME
          valueFrom: { secretKeyRef: { name: langfuse-init, key: LANGFUSE_INIT_ORG_NAME } }
        - name: LANGFUSE_INIT_PROJECT_ID
          valueFrom: { secretKeyRef: { name: langfuse-init, key: LANGFUSE_INIT_PROJECT_ID } }
        - name: LANGFUSE_INIT_PROJECT_NAME
          valueFrom: { secretKeyRef: { name: langfuse-init, key: LANGFUSE_INIT_PROJECT_NAME } }
        - name: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
          valueFrom: { secretKeyRef: { name: langfuse-init, key: LANGFUSE_INIT_PROJECT_PUBLIC_KEY } }
        - name: LANGFUSE_INIT_PROJECT_SECRET_KEY
          valueFrom: { secretKeyRef: { name: langfuse-init, key: LANGFUSE_INIT_PROJECT_SECRET_KEY } }
        - name: LANGFUSE_INIT_USER_EMAIL
          valueFrom: { secretKeyRef: { name: langfuse-init, key: LANGFUSE_INIT_USER_EMAIL } }
        - name: LANGFUSE_INIT_USER_NAME
          valueFrom: { secretKeyRef: { name: langfuse-init, key: LANGFUSE_INIT_USER_NAME } }
        - name: LANGFUSE_INIT_USER_PASSWORD
          valueFrom: { secretKeyRef: { name: langfuse-init, key: LANGFUSE_INIT_USER_PASSWORD } }
    livenessProbe:
      initialDelaySeconds: 120
      timeoutSeconds: 10
    readinessProbe:
      initialDelaySeconds: 60
      timeoutSeconds: 10

# --- PostgreSQL (app metadata) ---------------------------------------------
postgresql:
  deploy: true
  # Explicit port — chart default `port: null` leaves DATABASE_PORT unset in
  # the langfuse-web env, which breaks Prisma connection-string parsing
  # ("P1013: invalid port number in database URL"). Subchart's internal
  # postgres listens on 5432 regardless; this field just feeds the app env.
  port: 5432
  auth:
    username: postgres
    existingSecret: langfuse-postgresql
    secretKeys:
      userPasswordKey: password
      adminPasswordKey: password
    database: postgres_langfuse
  # Single-node persistence — k3d-storage bind-mount on /mnt/volume1.
  primary:
    persistence:
      enabled: true
      storageClass: local-path
      size: 5Gi

# --- Valkey (Redis-compatible) ---------------------------------------------
redis:
  deploy: true
  auth:
    username: default
    existingSecret: langfuse-redis
    existingSecretPasswordKey: password
  architecture: standalone  # single-node; no replica
  primary:
    persistence:
      enabled: true
      storageClass: local-path
      size: 1Gi
    # Langfuse docs require noeviction — chart default carries this, repeat for explicitness.
    extraFlags:
      - "--maxmemory-policy noeviction"

# --- ClickHouse (trace storage) --------------------------------------------
clickhouse:
  deploy: true
  auth:
    username: default
    existingSecret: langfuse-clickhouse
    existingSecretKey: password

  migration:
    autoMigrate: true

  # Single-node: disable ON-CLUSTER syntax, shrink to 1 replica.
  # shards is chart-pinned at 1 (Langfuse doesn't shard); no override.
  clusterEnabled: false
  replicaCount: 1
  resourcesPreset: small  # ~0.5 CPU / 1 Gi; small-dev. Research doc cites 6 CPU / 24 Gi for prod — we're not there.

  persistence:
    enabled: true
    storageClass: local-path
    size: 20Gi

  # ClickHouse bundled zookeeper for CH's replication/coordination. With
  # clusterEnabled=false + replicaCount=1 ZK is almost idle; trim to 1.
  zookeeper:
    enabled: true
    replicaCount: 1
    resourcesPreset: nano
    persistence:
      enabled: true
      storageClass: local-path
      size: 2Gi

  # TODO (#2 notes, research doc §1): override clickhouse.systemTableTTL
  # for issue langfuse/langfuse-k8s#333 (system tables grow unbounded → OOM
  # during merges). Exact override block is UNVERIFIED — pull from the
  # upstream issue before long-running deployment. Not blocking for first
  # install smoke.

# --- MinIO / S3 (event + export blobs) -------------------------------------
# Two layers of S3 credentials:
#  1. MinIO subchart auth (s3.auth.*)        — rooted at langfuse-s3 Secret;
#     keys `root-user` + `root-password`. Bitnami MinIO reads these into
#     MINIO_ROOT_USER + MINIO_ROOT_PASSWORD env on the langfuse-s3 pod.
#  2. Langfuse-app S3 client creds (s3.eventUpload/batchExport/mediaUpload)
#     — must reference the SAME langfuse-s3 Secret keys so the Langfuse
#     web/worker can authenticate against MinIO. The chart does NOT auto-
#     plumb (1) → (2); without explicit per-upload accessKeyId/secretAccessKey
#     here, the chart hardcodes ACCESS_KEY_ID="minio" and leaves
#     SECRET_ACCESS_KEY unset → InvalidAccessKeyId 403 from MinIO when
#     Langfuse tries to upload OTel ingestion JSON, which silently breaks
#     the OTLP→Langfuse pipeline (Collector POST → Langfuse 500 → Trace 404).
s3:
  deploy: true
  auth:
    existingSecret: langfuse-s3
    rootUserSecretKey: root-user
    rootPasswordSecretKey: root-password

  # Top-level defaults for accessKey/secretKey are inherited by per-upload-
  # type sections IF those don't override. Chart 1.5.27 nevertheless emits
  # all three sets of env vars separately, so we set per-section explicitly.
  eventUpload:
    accessKeyId:
      secretKeyRef:
        name: langfuse-s3
        key: root-user
    secretAccessKey:
      secretKeyRef:
        name: langfuse-s3
        key: root-password
  batchExport:
    accessKeyId:
      secretKeyRef:
        name: langfuse-s3
        key: root-user
    secretAccessKey:
      secretKeyRef:
        name: langfuse-s3
        key: root-password
  mediaUpload:
    accessKeyId:
      secretKeyRef:
        name: langfuse-s3
        key: root-user
    secretAccessKey:
      secretKeyRef:
        name: langfuse-s3
        key: root-password

  persistence:
    enabled: true
    storageClass: local-path
    size: 10Gi

# --- Langfuse web/worker Deployments ---------------------------------------
# Use chart defaults for replica counts + resources. Single-node can run 1
# web + 1 worker at chart defaults.
