apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd-applications
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    # kube-prometheus-stack's post-install admission-webhook setup creates
    # six resources as helm hooks (SA, Job, ClusterRole, ClusterRoleBinding,
    # Role, RoleBinding named `kube-prom-stack-kube-prome-admission`).
    # They persist in cluster after the hook runs but are not in ArgoCD's
    # rendered manifest set — default behavior is "prune as extraneous",
    # which would delete the admission-webhook trust chain. `IgnoreExtraneous`
    # tells ArgoCD to leave unlisted cluster resources alone: no prune, no
    # OutOfSync status from them. Refs #6.
    argocd.argoproj.io/compare-options: IgnoreExtraneous
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: operations
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 84.0.0
      helm:
        releaseName: kube-prom-stack
        valueFiles:
          - $values/environments/macf/values/kube-prometheus-stack.yaml
        skipCrds: false
    - repoURL: https://github.com/groundnuty/macf-devops-toolkit.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
