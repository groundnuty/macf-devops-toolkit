apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd-applications
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: operations
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 9.5.4
      helm:
        releaseName: argocd
        valueFiles:
          - $values/environments/macf/values/argocd.yaml
    - repoURL: https://github.com/groundnuty/macf-devops-toolkit.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  # Don't fight argocd's own bootstrap-generated admin credentials. Same
  # pattern as spice/azure-interway/apps/argocd-app.yaml.
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: argocd-secret
      jsonPointers:
        - /data/admin.password
        - /data/admin.passwordMtime
        - /data/server.secretkey
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
