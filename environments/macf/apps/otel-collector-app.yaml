apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd-applications
  annotations:
    # Wave 1: depends on otel-operator (wave 0) having registered the
    # OpenTelemetryCollector CRD before the Collector CR in this manifest
    # can reconcile.
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: operations
  source:
    repoURL: https://github.com/groundnuty/macf-devops-toolkit.git
    targetRevision: HEAD
    path: environments/macf/manifests/otel-collector
  destination:
    server: https://kubernetes.default.svc
    namespace: otel
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
