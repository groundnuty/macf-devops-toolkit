# k3d cluster declarative config.
# Consumed by: `k3d cluster create --config k3d/config.yaml` (Makefile `cluster` target).
# Schema:      https://k3d.io/v5.8/usage/configfile/ (kind: Simple)
#
# Key choices (see ../../../design/DR-001-argocd-gitops-for-observability-spike.md):
# - Single server, no agents (k3d-macf-server-0). Spike scale.
# - PVC storage bind-mounted from /mnt/volume1 so helm charts' PVCs
#   (Prometheus, Tempo, Grafana, Alertmanager) land on the data volume, not
#   inside the ephemeral k3d node container's filesystem.
# - Pre-created persistent registry referenced by host:port; k3d auto-wires
#   the cluster's containerd mirror through it. Registry MUST be created
#   first (Makefile dependency: cluster: registry).
# - Kubernetes API on 127.0.0.1:6443 only; no external exposure.
# - Traefik left enabled (k3d default); not used for ingress in the spike —
#   grafana/tempo/argocd are reached via `kubectl port-forward`.

apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: macf

# k3s image tag pinned in version.yaml; Makefile yq-extracts it for logging
# but the authoritative value lives here for `k3d cluster create --config`.
# Keep version.yaml's k3s_image in sync with this field.
image: rancher/k3s:v1.35.3-k3s1

servers: 1
agents: 0

registries:
  use:
    # Must match the Registry CR's metadata.name (k3d prefixes containers
    # with `k3d-`; the host-resolvable name is `k3d-macf-mirror`).
    - k3d-macf-mirror:5001

volumes:
  # Local-path-provisioner storage dir — every PVC landing here is on
  # /mnt/volume1 on the host via this bind mount.
  - volume: /mnt/volume1/k3d-storage:/var/lib/rancher/k3s/storage
    nodeFilters:
      - all

# Kubernetes API server exposure. k3d's `exposeAPI` is the correct surface
# for this — the generic `ports:` stanza maps ports on the load balancer
# but doesn't update the generated kubeconfig (we observed kubeconfig still
# pointing at k3d's auto-assigned random port despite the port-forward).
# `exposeAPI.hostPort` is what k3d writes into the kubeconfig's server URL.
options:
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
  k3d:
    wait: true
    timeout: 2m
  k3s:
    extraArgs:
      # Keep Traefik; kept for completeness — no ingress used in the spike.
      []

# Stable OTLP ingress on host — 127.0.0.1:14317 (gRPC) + :14318 (HTTP) routed
# through k3d's serverlb (nginx) to the central OpenTelemetry Collector via
# the `central-collector-lb` LoadBalancer Service in ns/otel. See
# ../manifests/otel-collector/otlp-lb-service.yaml + README "Stable OTLP
# endpoint" section + `groundnuty/macf-science-agent:research/2026-04-24-tracing-plumbing-integration-sketch.md`
# §6 PR A.
#
# High host ports (14317/14318) avoid collision with the prior-generation
# compose collector stack (macf-obs-otel-collector-1, binds :4317/:4318).
# Testers + smoke scripts can `curl http://localhost:14318/v1/traces` directly,
# no kubectl-port-forward round-trip.
#
# **Compatibility-port mapping** (added per groundnuty/macf-devops-toolkit#60,
# 2026-04-29): also bind 127.0.0.1:4317 + :4318 → cluster's :4317/:4318 so
# agents whose claude.sh predates `groundnuty/macf` PR #283 (canonical
# template default flipped from :4318 to :14318) keep working without
# per-agent re-bootstrap. Compose stack on this host has been retired —
# :4317/:4318 are free to bind via k3d serverlb.
#
# Without these compat ports, OTLP exporters defaulting to `localhost:4318`
# get connection-refused, retry until backoff, and drop spans silently —
# producing the silent-fallback-hazard documented as Instance 8 in
# `groundnuty/macf-science-agent:.claude/rules/silent-fallback-hazards.md`.
# Detection: see Pattern A defense in `hack/check-tempo-ingestion.sh`.
#
# For live cluster adds (no recreate), use:
#   k3d cluster edit macf --port-add "127.0.0.1:14317:4317@loadbalancer" \
#                         --port-add "127.0.0.1:14318:4318@loadbalancer" \
#                         --port-add "127.0.0.1:4317:4317@loadbalancer" \
#                         --port-add "127.0.0.1:4318:4318@loadbalancer"
# These ports entries here make the same mapping persistent on cluster
# recreate (`make cluster-down && make cluster`).
ports:
  - port: 127.0.0.1:14317:4317
    nodeFilters:
      - loadbalancer
  - port: 127.0.0.1:14318:4318
    nodeFilters:
      - loadbalancer
  - port: 127.0.0.1:4317:4317
    nodeFilters:
      - loadbalancer
  - port: 127.0.0.1:4318:4318
    nodeFilters:
      - loadbalancer

# Expose the Kubernetes API on localhost:6443 only.
# (k3d v1alpha5 schema: field is `kubeAPI`, not `exposeAPI`.)
kubeAPI:
  host: "127.0.0.1"
  hostIP: "127.0.0.1"
  hostPort: "6443"
