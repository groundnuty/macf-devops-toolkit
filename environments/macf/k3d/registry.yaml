# k3d registry declarative config.
# Consumed by: `k3d registry create --config k3d/registry.yaml` (Makefile `registry` target).
# Schema:      https://k3d.io/v5.8/usage/configfile/ (kind: Registry)
#
# This registry is the cluster's system-level image cache — it survives
# `k3d cluster delete` + recreate, so image pulls only happen once per
# image tag even across cluster rebuilds. Data persists on /mnt/volume1
# per ../../../design/DR-001-argocd-gitops-for-observability-spike.md §6.

apiVersion: k3d.io/v1alpha5
kind: Registry
metadata:
  name: macf-mirror
host: "0.0.0.0"
hostPort: "5001"
volumes:
  - /mnt/volume1/k3d-registry-data:/var/lib/registry
